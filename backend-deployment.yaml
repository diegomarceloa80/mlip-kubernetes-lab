apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-backend
  template:
    metadata:
      labels:
        app: flask-backend
    spec:
      containers:
      - name: flask-backend
        # Imagen actualizada con tu usuario
        image: diegomarceloap/flask-backend:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "kill -s USR1 1 && sleep 5"]
        volumeMounts:
        - name: model-volume
          mountPath: /shared-volume
          readOnly: true
      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: flask-backend-service
spec:
  type: NodePort
  selector:
    app: flask-backend
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30080